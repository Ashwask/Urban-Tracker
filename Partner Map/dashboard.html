<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partner Map · India</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f0e8;--surf:#fff;--dark:#1a2830;
  --teal:#16796e;--gold:#c4921a;--green:#1a7847;--orange:#c96a28;
  --muted:#5a7480;--line:#e2ddd4;
}
body{font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--dark)}

/* HEADER */
.header{background:var(--dark);padding:24px 32px 20px;color:#fff;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.header-text h1{font-size:1.4rem;font-weight:700;margin-bottom:2px}
.header-text p{font-size:.78rem;color:rgba(255,255,255,.4);max-width:420px}
.stats{display:flex;gap:20px;margin-left:auto}
.stat .n{font-size:1.6rem;font-weight:800;color:var(--teal);line-height:1.1}
.stat .l{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3)}

/* CONTROLS */
.controls{padding:10px 32px;background:var(--bg);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.controls label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.pill{padding:3px 12px;border-radius:20px;border:1.5px solid var(--line);background:none;cursor:pointer;font-size:.75rem;font-weight:500;color:var(--dark);font-family:inherit;transition:.15s}
.pill.on{background:var(--dark);border-color:var(--dark);color:#fff}
.pill:hover:not(.on){border-color:var(--teal);color:var(--teal)}
.legend{margin-left:auto;display:flex;gap:12px;font-size:.7rem;color:var(--muted)}
.legend span::before{content:'';display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}
.legend .lu::before{background:var(--teal)}.legend .lr::before{background:var(--gold)}
.legend .lc::before{background:var(--green)}.legend .lb::before{background:var(--orange)}

/* LAYOUT */
.wrap{display:flex;height:calc(100vh - 115px)}
#map{flex:1;min-width:0}
.sidebar{width:300px;flex-shrink:0;background:var(--surf);border-left:1px solid var(--line);display:flex;flex-direction:column}
.sb-head{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;padding:10px 16px;border-bottom:1px solid var(--line)}
.sb-list{flex:1;overflow-y:auto}
.sb-item{padding:9px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
.sb-item:hover{background:rgba(22,121,110,.06)}
.sb-item.active{background:rgba(22,121,110,.10);border-left:3px solid var(--teal)}
.sb-name{font-size:.8rem;font-weight:600}
.sb-geo{font-size:.7rem;color:var(--muted)}
.sb-cat{display:inline-block;font-size:.6rem;padding:1px 6px;border-radius:4px;margin-top:2px;font-weight:500}
.sb-states{font-size:.65rem;color:var(--teal);margin-top:2px}
@media(max-width:900px){.sidebar{display:none}}

/* SELECTED PARTNER INFO PANEL */
.info-panel{display:none;position:absolute;bottom:24px;left:24px;z-index:1000;background:var(--surf);border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.18);padding:16px 20px;max-width:360px;font-size:.82rem;line-height:1.5}
.info-panel.show{display:block}
.info-panel h3{font-size:.95rem;margin-bottom:2px}
.info-panel .ip-geo{font-size:.72rem;color:var(--muted);margin-bottom:6px}
.info-panel .ip-cat{display:inline-block;font-size:.65rem;padding:1px 7px;border-radius:4px;margin-bottom:6px;font-weight:500}
.info-panel .ip-desc{font-size:.78rem;color:#3d5560;margin-bottom:8px}
.info-panel .ip-states{font-size:.72rem;color:var(--teal);font-weight:600}
.info-panel .ip-states span{font-weight:400;color:var(--muted)}
.info-close{position:absolute;top:8px;right:12px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted);font-family:inherit}
.info-close:hover{color:var(--dark)}

/* LAYER TOGGLE */
.layer-toggle{position:absolute;top:12px;right:12px;z-index:1000;background:var(--surf);border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.12);padding:10px 14px;font-size:.72rem}
.layer-toggle h4{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.layer-toggle label{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;color:var(--dark);font-weight:500}
.layer-toggle label:last-child{margin-bottom:0}
.layer-toggle input{accent-color:var(--teal)}

/* LEAFLET */
.leaflet-popup-content-wrapper{border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.leaflet-popup-content{margin:10px 14px;font-family:inherit;font-size:.82rem;line-height:1.5}
.leaflet-popup-content strong{display:block;font-size:.88rem;margin-bottom:2px}
.leaflet-popup-content em{font-size:.72rem;color:var(--muted);font-style:normal}
.leaflet-popup-content .pdesc{font-size:.78rem;color:#3d5560;margin-top:6px;padding-top:6px;border-top:1px solid #eee}
.leaflet-popup-content .pstates{font-size:.7rem;color:var(--teal);margin-top:4px;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <div class="header-text">
    <h1>Partners across India</h1>
    <p>Layer 1: HQ locations. Click a partner to see Layer 2: their geographies of work highlighted on the map.</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="n" id="s-total">93</div><div class="l">Partners</div></div>
    <div class="stat"><div class="n" id="s-cities">30</div><div class="l">Cities</div></div>
    <div class="stat"><div class="n" id="s-states">18</div><div class="l">States</div></div>
  </div>
</div>

<div class="controls">
  <label>Filter:</label>
  <button class="pill on" data-cat="all">All</button>
  <button class="pill" data-cat="Urban">Urban</button>
  <button class="pill" data-cat="Rural">Rural</button>
  <button class="pill" data-cat="CnR">Conservation</button>
  <button class="pill" data-cat="Buildings">Buildings</button>
  <div class="legend">
    <span class="lu">Urban</span>
    <span class="lr">Rural</span>
    <span class="lc">CnR</span>
    <span class="lb">Buildings</span>
  </div>
</div>

<div class="wrap">
  <div id="map" style="position:relative">
    <!-- Layer toggle control -->
    <div class="layer-toggle" id="layer-toggle">
      <h4>Layers</h4>
      <label><input type="checkbox" id="lyr-hq" checked> HQ Locations</label>
      <label><input type="checkbox" id="lyr-states" checked> State Boundaries</label>
      <label><input type="checkbox" id="lyr-geo" checked> Geographies of Work</label>
    </div>
    <!-- Info panel -->
    <div class="info-panel" id="info-panel">
      <button class="info-close" id="info-close">&times;</button>
      <h3 id="ip-name"></h3>
      <div class="ip-geo" id="ip-geo"></div>
      <span class="ip-cat" id="ip-cat"></span>
      <div class="ip-desc" id="ip-desc"></div>
      <div class="ip-states"><span>Works in: </span><span id="ip-states"></span></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="sb-head">Partner List <span id="sb-count" style="font-weight:400">(93)</span></div>
    <div class="sb-list" id="sb-list"></div>
  </div>
</div>

<script src="partners.js"></script>
<script>
var CAT_COL = {Urban:'#16796e', Rural:'#c4921a', CnR:'#1a7847', Buildings:'#c96a28'};
var activeCat = 'all';
var selectedPartner = null;
var statesGeoJSON = null;
var geoLayer = null;  // Layer 2: highlighted states for selected partner

// Init Leaflet map
var map = L.map('map',{zoomControl:true}).setView([22, 79.5], 5);

// OpenStreetMap tiles (open source)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  maxZoom:18
}).addTo(map);

// State boundaries layer (always on)
var statesLayer = null;
fetch('india_states_simple.geojson')
  .then(function(r){return r.json();})
  .then(function(gj){
    statesGeoJSON = gj;
    statesLayer = L.geoJSON(gj,{
      style:function(){return{color:'rgba(22,121,110,0.35)',weight:1,fillColor:'rgba(22,121,110,0.04)',fillOpacity:1};},
      onEachFeature:function(f,layer){
        var name = f.properties.ST_NM || f.properties.NAME_1 || '';
        if(name) layer.bindTooltip(name,{sticky:true,className:'state-tip'});
      }
    }).addTo(map);
  })
  .catch(function(e){console.warn('State boundaries unavailable',e);});

// Cluster group for HQ markers (Layer 1)
var markers = L.markerClusterGroup({
  maxClusterRadius:40,
  spiderfyOnMaxZoom:true,
  showCoverageOnHover:false,
  iconCreateFunction:function(cluster){
    var count = cluster.getChildCount();
    var size = count<5?34:count<15?42:50;
    return L.divIcon({
      html:'<div style="background:#16796e;color:#fff;border-radius:50%;width:'+size+'px;height:'+size+'px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">'+count+'</div>',
      className:'',iconSize:[size,size]
    });
  }
});
map.addLayer(markers);

function makeIcon(cat,isSelected){
  var col = CAT_COL[cat]||'#16796e';
  var sz = isSelected?20:14;
  var bw = isSelected?3:2;
  var ring = isSelected?'box-shadow:0 0 0 4px '+col+'44,0 2px 8px rgba(0,0,0,.3)':'box-shadow:0 2px 6px rgba(0,0,0,.25)';
  return L.divIcon({
    html:'<div style="background:'+col+';width:'+sz+'px;height:'+sz+'px;border-radius:50%;border:'+bw+'px solid #fff;'+ring+'"></div>',
    className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2]
  });
}

function getFiltered(){
  return activeCat==='all'?MAP_PARTNERS:MAP_PARTNERS.filter(function(p){return p.cat===activeCat;});
}

// State name normalization for matching GeoJSON
var STATE_ALIAS = {
  'pan india':null,'nct of delhi':'NCT of Delhi','delhi':'NCT of Delhi','delhi ncr':'NCT of Delhi',
  'karnataka':'Karnataka','maharashtra':'Maharashtra','tamil nadu':'Tamil Nadu',
  'kerala':'Kerala','telangana':'Telangana','andhra pradesh':'Andhra Pradesh',
  'west bengal':'West Bengal','odisha':'Odisha','uttar pradesh':'Uttar Pradesh',
  'rajasthan':'Rajasthan','madhya pradesh':'Madhya Pradesh','gujarat':'Gujarat',
  'bihar':'Bihar','jharkhand':'Jharkhand','assam':'Assam','uttarakhand':'Uttarakhand',
  'himachal pradesh':'Himachal Pradesh','goa':'Goa','chhattisgarh':'Chhattisgarh',
  'meghalaya':'Meghalaya','arunachal pradesh':'Arunachal Pradesh','sikkim':'Sikkim',
  'nagaland':'Nagaland','mizoram':'Mizoram','haryana':'Haryana',
  'jammu & kashmir':'Jammu & Kashmir','northeast india':'Assam'
};

function normalizeState(s){
  var lower = s.toLowerCase().trim();
  if(lower in STATE_ALIAS) return STATE_ALIAS[lower];
  return s.trim();
}

function highlightStates(partner){
  // Remove old highlight
  if(geoLayer){map.removeLayer(geoLayer);geoLayer=null;}
  if(!statesGeoJSON||!partner) return;

  var isPanIndia = partner.states.some(function(s){return s==='Pan India';});

  if(isPanIndia){
    // Highlight all states
    geoLayer = L.geoJSON(statesGeoJSON,{
      style:function(){return{color:CAT_COL[partner.cat]||'#16796e',weight:2.5,fillColor:CAT_COL[partner.cat]||'#16796e',fillOpacity:0.15,dashArray:''};}
    }).addTo(map);
  } else {
    var normalized = partner.states.map(normalizeState).filter(Boolean);
    var matchedFeatures = {type:'FeatureCollection',features:[]};

    statesGeoJSON.features.forEach(function(f){
      var name = (f.properties.ST_NM||f.properties.NAME_1||'').trim();
      for(var i=0;i<normalized.length;i++){
        if(name===normalized[i]||name.toLowerCase()===normalized[i].toLowerCase()){
          matchedFeatures.features.push(f);
          break;
        }
      }
    });

    if(matchedFeatures.features.length){
      var col = CAT_COL[partner.cat]||'#16796e';
      geoLayer = L.geoJSON(matchedFeatures,{
        style:function(){return{color:col,weight:2.5,fillColor:col,fillOpacity:0.18,dashArray:''};}
      }).addTo(map);
    }
  }
}

function showInfoPanel(p){
  var col = CAT_COL[p.cat]||'#16796e';
  document.getElementById('ip-name').textContent = p.name;
  document.getElementById('ip-geo').textContent = 'HQ: '+p.geo;
  var catEl = document.getElementById('ip-cat');
  catEl.textContent = p.cat;
  catEl.style.background = col+'18';
  catEl.style.color = col;
  document.getElementById('ip-desc').textContent = p.desc;
  document.getElementById('ip-states').textContent = p.states.join(', ');
  document.getElementById('info-panel').classList.add('show');
}

function selectPartner(p){
  selectedPartner = p;
  highlightStates(p);
  showInfoPanel(p);
  // Highlight in sidebar
  document.querySelectorAll('.sb-item').forEach(function(el){
    el.classList.toggle('active',el.dataset.name===p.name);
  });
}

function clearSelection(){
  selectedPartner = null;
  if(geoLayer){map.removeLayer(geoLayer);geoLayer=null;}
  document.getElementById('info-panel').classList.remove('show');
  document.querySelectorAll('.sb-item').forEach(function(el){el.classList.remove('active');});
}

function renderMarkers(){
  markers.clearLayers();
  clearSelection();
  var pts = getFiltered();

  pts.forEach(function(p){
    var m = L.marker([p.lat,p.lon],{icon:makeIcon(p.cat,false)});
    m.on('click',function(){
      selectPartner(p);
      var col = CAT_COL[p.cat]||'#16796e';
      var statesText = p.states.join(', ');
      m.bindPopup(
        '<strong>'+p.name+'</strong><em>'+p.geo+'</em>'+
        '<span style="display:inline-block;background:'+col+'22;color:'+col+';padding:1px 7px;border-radius:4px;font-size:.7rem;margin:4px 0">'+p.cat+'</span>'+
        '<div class="pdesc">'+p.desc+'</div>'+
        '<div class="pstates">Works in: '+statesText+'</div>',
        {maxWidth:260}
      ).openPopup();
    });
    markers.addLayer(m);
  });

  // Sidebar
  var list = document.getElementById('sb-list');
  document.getElementById('sb-count').textContent = '('+pts.length+')';
  document.getElementById('s-total').textContent = pts.length;
  list.innerHTML = pts.map(function(p){
    var col = CAT_COL[p.cat]||'#16796e';
    return '<div class="sb-item" data-name="'+p.name.replace(/"/g,'&quot;')+'">'
      +'<div class="sb-name">'+p.name+'</div>'
      +'<div class="sb-geo">'+p.geo+'</div>'
      +'<span class="sb-cat" style="background:'+col+'18;color:'+col+'">'+p.cat+'</span>'
      +'<div class="sb-states">'+p.states.join(', ')+'</div></div>';
  }).join('');
}

// Sidebar click
document.getElementById('sb-list').addEventListener('click',function(e){
  var item = e.target.closest('.sb-item');
  if(!item) return;
  var name = item.dataset.name;
  var p = MAP_PARTNERS.find(function(x){return x.name===name;});
  if(!p) return;
  selectPartner(p);
  map.setView([p.lat,p.lon],7,{animate:true});
});

// Close info panel
document.getElementById('info-close').addEventListener('click',clearSelection);

// Click on map background clears selection
map.on('click',function(e){
  // Only clear if not clicking a marker
  if(!e.originalEvent._stopped){
    clearSelection();
  }
});

// Filter pills
document.querySelectorAll('.pill').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(function(b){b.classList.remove('on');});
    this.classList.add('on');
    activeCat = this.dataset.cat;
    renderMarkers();
  });
});

// Layer toggles
document.getElementById('lyr-hq').addEventListener('change',function(){
  if(this.checked) map.addLayer(markers);
  else map.removeLayer(markers);
});
document.getElementById('lyr-states').addEventListener('change',function(){
  if(!statesLayer) return;
  if(this.checked) map.addLayer(statesLayer);
  else map.removeLayer(statesLayer);
});
document.getElementById('lyr-geo').addEventListener('change',function(){
  if(!geoLayer) return;
  if(this.checked) map.addLayer(geoLayer);
  else map.removeLayer(geoLayer);
});

// Move layer toggle into the map container after map init
setTimeout(function(){
  var mapDiv = document.getElementById('map');
  mapDiv.appendChild(document.getElementById('layer-toggle'));
  mapDiv.appendChild(document.getElementById('info-panel'));
},0);

// Go
renderMarkers();
</script>
</body>
</html>
